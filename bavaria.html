<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bavaria Motors — Aankoopdashboard</title>
<script src="https://alcdn.msauth.net/browser/2.38.3/js/msal-browser.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #1a1a1a; height: 100vh; display: flex; flex-direction: column; }
header { background: #185FA5; color: white; padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; }
header h1 { font-size: 18px; font-weight: 500; }
header span { font-size: 13px; opacity: 0.8; }
#user-info { font-size: 12px; background: rgba(255,255,255,0.2); padding: 4px 12px; border-radius: 20px; }
.dashboard { display: grid; grid-template-columns: 380px 1fr; flex: 1; overflow: hidden; }
.left { background: white; border-right: 1px solid #e5e5e5; display: flex; flex-direction: column; overflow: hidden; }
.left-header { padding: 14px 16px 10px; border-bottom: 1px solid #e5e5e5; }
.left-header h2 { font-size: 15px; font-weight: 600; display: flex; align-items: center; justify-content: space-between; }
.refresh-btn { font-size: 12px; color: #185FA5; cursor: pointer; background: none; border: none; padding: 2px 6px; border-radius: 4px; }
.refresh-btn:hover { background: #E6F1FB; }
.search-area { padding: 10px 12px; border-bottom: 1px solid #e5e5e5; }
.search-area input { width: 100%; padding: 7px 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; outline: none; }
.search-area input:focus { border-color: #185FA5; }
.filters { display: flex; gap: 6px; padding: 8px 12px; border-bottom: 1px solid #e5e5e5; }
.filters select { flex: 1; padding: 5px 6px; border: 1px solid #ddd; border-radius: 6px; font-size: 11px; outline: none; }
.count-bar { padding: 6px 12px; font-size: 11px; color: #888; border-bottom: 1px solid #e5e5e5; }
.gallery { flex: 1; overflow-y: auto; }
.card { padding: 12px 14px; border-bottom: 1px solid #f0f0f0; cursor: pointer; transition: background 0.1s; }
.card:hover { background: #f8f9ff; }
.card.selected { background: #E6F1FB; border-left: 3px solid #185FA5; }
.card-title { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card-meta { font-size: 11px; color: #888; margin-top: 3px; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 600; margin-top: 5px; }
.badge-nieuw { background: #E6F1FB; color: #185FA5; }
.badge-goedgekeurd { background: #EAF3DE; color: #3B6D11; }
.badge-manueel { background: #EAF3DE; color: #3B6D11; }
.badge-afgewezen { background: #FCEBEB; color: #A32D2D; }
.badge-onbekend { background: #F1EFE8; color: #5F5E5A; }
.right { background: white; display: flex; flex-direction: column; overflow: hidden; }
.right-header { padding: 14px 16px 10px; border-bottom: 1px solid #e5e5e5; display: flex; align-items: center; justify-content: space-between; }
.right-header h2 { font-size: 15px; font-weight: 600; }
.action-btns { display: flex; gap: 8px; }
.btn-save { padding: 6px 16px; background: #185FA5; color: white; border: none; border-radius: 6px; font-size: 12px; cursor: pointer; }
.btn-save:hover { background: #0C447C; }
.btn-approve { padding: 6px 16px; background: #3B6D11; color: white; border: none; border-radius: 6px; font-size: 12px; cursor: pointer; }
.btn-reject { padding: 6px 16px; background: #A32D2D; color: white; border: none; border-radius: 6px; font-size: 12px; cursor: pointer; }
.detail-content { flex: 1; overflow-y: auto; padding: 16px; }
.section-title { font-size: 11px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; margin-top: 16px; }
.field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
.field { display: flex; flex-direction: column; gap: 4px; }
.field.full { grid-column: 1 / -1; }
.field label { font-size: 11px; color: #888; }
.field input, .field select, .field textarea { padding: 7px 9px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; outline: none; font-family: inherit; }
.field input:focus, .field select:focus, .field textarea:focus { border-color: #185FA5; }
.field textarea { min-height: 80px; resize: vertical; }
.raw-toggle { font-size: 11px; color: #888; cursor: pointer; padding: 8px 0; display: flex; align-items: center; gap: 4px; user-select: none; }
.raw-toggle:hover { color: #185FA5; }
.raw-pre { font-size: 11px; background: #f8f8f8; padding: 10px; border-radius: 6px; white-space: pre-wrap; word-break: break-word; color: #555; max-height: 200px; overflow-y: auto; margin-top: 4px; border: 1px solid #eee; }
.placeholder { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: #aaa; gap: 8px; }
.placeholder svg { width: 48px; height: 48px; opacity: 0.3; }
.loading { display: flex; align-items: center; justify-content: center; height: 100%; color: #888; font-size: 13px; }
.login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; gap: 16px; background: #f5f5f5; }
.login-card { background: white; padding: 32px 40px; border-radius: 12px; text-align: center; box-shadow: 0 2px 20px rgba(0,0,0,0.08); max-width: 380px; }
.login-card h2 { font-size: 20px; font-weight: 600; margin-bottom: 8px; color: #185FA5; }
.login-card p { font-size: 13px; color: #888; margin-bottom: 20px; }
.btn-login { padding: 10px 28px; background: #185FA5; color: white; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; width: 100%; }
.btn-login:hover { background: #0C447C; }
.error { padding: 12px; background: #FCEBEB; border-radius: 8px; color: #A32D2D; font-size: 12px; margin: 8px 12px; }
.toast { position: fixed; bottom: 20px; right: 20px; background: #185FA5; color: white; padding: 10px 20px; border-radius: 8px; font-size: 13px; z-index: 9999; opacity: 0; transition: opacity 0.3s; }
.toast.show { opacity: 1; }
</style>
</head>
<body>

<div id="login-screen" class="login-screen" style="display:none">
  <div class="login-card">
    <h2>Bavaria Motors</h2>
    <p>Log in met julien@bavariamotors.be om het Aankoopdashboard te openen</p>
    <button class="btn-login" onclick="login()">Inloggen met Microsoft</button>
    <div id="login-error" style="display:none;margin-top:12px;"></div>
  </div>
</div>

<div id="app" style="display:none; flex-direction:column; height:100vh;">
  <header>
    <h1>Bavaria Motors — Aankoopdashboard</h1>
    <span id="user-info">Laden...</span>
  </header>
  <div class="dashboard">
    <div class="left">
      <div class="left-header">
        <h2>Aanbiedingen <button class="refresh-btn" onclick="loadData()">↻ Vernieuwen</button></h2>
      </div>
      <div class="search-area">
        <input type="text" id="search" placeholder="🔍 Zoek op naam of AI-samenvatting..." oninput="filterCards()" />
      </div>
      <div class="filters">
        <select id="filter-status" onchange="filterCards()">
          <option value="">Alle statussen</option>
          <option value="102820000">Nieuw</option>
          <option value="102820001">Goedgekeurd</option>
          <option value="102820002">Manueel goedgekeurd</option>
          <option value="102820003">Afgewezen</option>
        </select>
        <select id="filter-bron" onchange="filterCards()">
          <option value="">Alle bronnen</option>
          <option value="102820000">WhatsApp</option>
          <option value="102820001">Website</option>
          <option value="102820002">Email</option>
        </select>
        <select id="filter-type" onchange="filterCards()">
          <option value="">Alle types</option>
          <option value="102820000">Particulier</option>
          <option value="102820001">Handelaar</option>
          <option value="102820002">Importeur</option>
        </select>
      </div>
      <div class="count-bar" id="count">Laden...</div>
      <div class="gallery" id="gallery">
        <div class="loading">Verbinden met Dataverse...</div>
      </div>
    </div>
    <div class="right">
      <div class="right-header">
        <h2 id="detail-title">Detail</h2>
        <div class="action-btns" id="action-btns" style="display:none">
          <button class="btn-approve" onclick="quickStatus(102820001)">✓ Goedkeuren</button>
          <button class="btn-reject" onclick="quickStatus(102820003)">✗ Afwijzen</button>
          <button class="btn-save" onclick="saveRecord()">Opslaan</button>
        </div>
      </div>
      <div class="detail-content" id="detail-content">
        <div class="placeholder">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
          <span>Selecteer een aanbieding</span>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const TENANT_ID = 'ca546dbe-173e-4472-a229-a1693f306e1c';
const CLIENT_ID = '20ea0053-8bb6-49b9-90a6-9198a80e746a';
const DATAVERSE_URL = 'https://org2dfe0154.crm4.dynamics.com';
const API = `${DATAVERSE_URL}/api/data/v9.2`;

const STATUS_MAP = {102820000:'Nieuw',102820001:'Goedgekeurd',102820002:'Manueel goedgekeurd',102820003:'Afgewezen'};
const BRON_MAP = {102820000:'WhatsApp',102820001:'Website',102820002:'Email'};
const TYPE_MAP = {102820000:'Particulier',102820001:'Handelaar',102820002:'Importeur'};
const STATUS_BADGE = {102820000:'badge-nieuw',102820001:'badge-goedgekeurd',102820002:'badge-manueel',102820003:'badge-afgewezen'};

let msalInstance, allRecords = [], selectedRecord = null;

const msalConfig = {
  auth: {
    clientId: CLIENT_ID,
    authority: `https://login.microsoftonline.com/${TENANT_ID}`,
    redirectUri: 'http://localhost'
  },
  cache: { cacheLocation: 'localStorage' }
};

async function init() {
  msalInstance = new msal.PublicClientApplication(msalConfig);
  await msalInstance.initialize();
  const resp = await msalInstance.handleRedirectPromise();
  if (resp) { showApp(resp.account); loadData(); return; }
  const accounts = msalInstance.getAllAccounts();
  if (accounts.length > 0) { showApp(accounts[0]); loadData(); }
  else { document.getElementById('login-screen').style.display = 'flex'; }
}

function showApp(account) {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('user-info').textContent = account.username;
}

async function login() {
  try {
    await msalInstance.loginRedirect({ scopes: [`${DATAVERSE_URL}/user_impersonation`] });
  } catch(e) {
    const el = document.getElementById('login-error');
    el.style.display = 'block';
    el.textContent = 'Fout: ' + e.message;
    el.style.color = '#A32D2D';
  }
}

async function getToken() {
  const accounts = msalInstance.getAllAccounts();
  const req = { scopes: [`${DATAVERSE_URL}/user_impersonation`], account: accounts[0] };
  try { return (await msalInstance.acquireTokenSilent(req)).accessToken; }
  catch { return (await msalInstance.acquireTokenPopup(req)).accessToken; }
}

async function loadData() {
  document.getElementById('gallery').innerHTML = '<div class="loading">Data ophalen...</div>';
  try {
    const token = await getToken();
    const res = await fetch(`${API}/cre1c_aanbiedings?$orderby=createdon desc&$top=200`, {
      headers: { Authorization: `Bearer ${token}`, Accept: 'application/json', 'OData-MaxVersion': '4.0', 'OData-Version': '4.0' }
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    allRecords = data.value || [];
    filterCards();
    showToast(`${allRecords.length} aanbiedingen geladen`);
  } catch(e) {
    document.getElementById('gallery').innerHTML = `<div class="error">Fout: ${e.message}</div>`;
  }
}

function filterCards() {
  const search = document.getElementById('search').value.toLowerCase();
  const status = document.getElementById('filter-status').value;
  const bron = document.getElementById('filter-bron').value;
  const type = document.getElementById('filter-type').value;
  const filtered = allRecords.filter(r => {
    const name = (r.cre1c_aanbiedingnaam || '').toLowerCase();
    const ai = (r.cre1c_aisamenvatting || '').toLowerCase();
    return (!search || name.includes(search) || ai.includes(search))
      && (!status || String(r.cre1c_status) === status)
      && (!bron || String(r.cre1c_bron) === bron)
      && (!type || String(r.cre1c_typeaanbieder) === type);
  });
  document.getElementById('count').textContent = `${filtered.length} van ${allRecords.length} resultaten`;
  renderCards(filtered);
}

function renderCards(records) {
  if (!records.length) {
    document.getElementById('gallery').innerHTML = '<div class="loading">Geen resultaten</div>';
    return;
  }
  document.getElementById('gallery').innerHTML = records.map(r => {
    const statusLabel = STATUS_MAP[r.cre1c_status] || 'Onbekend';
    const badgeClass = STATUS_BADGE[r.cre1c_status] || 'badge-onbekend';
    const bronLabel = BRON_MAP[r.cre1c_bron] || '';
    const typeLabel = TYPE_MAP[r.cre1c_typeaanbieder] || '';
    const date = r.cre1c_datumbinnenkomst ? new Date(r.cre1c_datumbinnenkomst).toLocaleDateString('nl-BE') : '';
    const isSelected = selectedRecord && selectedRecord.cre1c_aanbiedingid === r.cre1c_aanbiedingid;
    const name = r.cre1c_aanbiedingnaam || '(geen naam)';
    return `<div class="card ${isSelected ? 'selected' : ''}" onclick="selectRecord('${r.cre1c_aanbiedingid}')">
      <div class="card-title">${escHtml(name)}</div>
      <div class="card-meta">${bronLabel}${typeLabel ? ' · ' + typeLabel : ''}${r.cre1c_toegewezenaan ? ' · ' + r.cre1c_toegewezenaan : ''}${date ? ' · ' + date : ''}</div>
      <span class="badge ${badgeClass}">${statusLabel}</span>
    </div>`;
  }).join('');
}

function selectRecord(id) {
  selectedRecord = allRecords.find(r => r.cre1c_aanbiedingid === id);
  filterCards();
  renderDetail();
}

function renderDetail() {
  const r = selectedRecord;
  if (!r) return;
  document.getElementById('action-btns').style.display = 'flex';
  document.getElementById('detail-title').textContent = r.cre1c_aanbiedingnaam || 'Detail';
  const rawHtml = (r.cre1c_ruwebrondata || '').replace(/<[^>]*>/g, '').trim();
  document.getElementById('detail-content').innerHTML = `
    <div class="section-title">Basisinfo</div>
    <div class="field-grid">
      <div class="field full"><label>Aanbieding naam</label><input id="d-naam" value="${escAttr(r.cre1c_aanbiedingnaam || '')}" /></div>
      <div class="field"><label>Status</label><select id="d-status">
        <option value="">Kies...</option>
        <option value="102820000" ${r.cre1c_status==102820000?'selected':''}>Nieuw</option>
        <option value="102820001" ${r.cre1c_status==102820001?'selected':''}>Goedgekeurd</option>
        <option value="102820002" ${r.cre1c_status==102820002?'selected':''}>Manueel goedgekeurd</option>
        <option value="102820003" ${r.cre1c_status==102820003?'selected':''}>Afgewezen</option>
      </select></div>
      <div class="field"><label>Bron</label><select id="d-bron">
        <option value="">Kies...</option>
        <option value="102820000" ${r.cre1c_bron==102820000?'selected':''}>WhatsApp</option>
        <option value="102820001" ${r.cre1c_bron==102820001?'selected':''}>Website</option>
        <option value="102820002" ${r.cre1c_bron==102820002?'selected':''}>Email</option>
      </select></div>
      <div class="field"><label>Type aanbieder</label><select id="d-type">
        <option value="">Kies...</option>
        <option value="102820000" ${r.cre1c_typeaanbieder==102820000?'selected':''}>Particulier</option>
        <option value="102820001" ${r.cre1c_typeaanbieder==102820001?'selected':''}>Handelaar</option>
        <option value="102820002" ${r.cre1c_typeaanbieder==102820002?'selected':''}>Importeur</option>
      </select></div>
      <div class="field"><label>Toegewezen aan</label><input id="d-toegewezen" value="${escAttr(r.cre1c_toegewezenaan || '')}" /></div>
      <div class="field"><label>Datum binnenkomst</label><input type="date" id="d-datum" value="${r.cre1c_datumbinnenkomst ? r.cre1c_datumbinnenkomst.substring(0,10) : ''}" /></div>
    </div>
    <div class="section-title">AI & Brondata</div>
    <div class="field" style="margin-bottom:12px"><label>AI samenvatting</label><textarea id="d-ai">${escHtml(r.cre1c_aisamenvatting || '')}</textarea></div>
    ${rawHtml ? `<div class="raw-toggle" onclick="toggleRaw(this)">▶ Ruwe brondata tonen</div><div class="raw-pre" style="display:none">${escHtml(rawHtml.substring(0,1000))}</div>` : ''}
  `;
}

function toggleRaw(el) {
  const pre = el.nextElementSibling;
  if (pre.style.display === 'none') { pre.style.display = 'block'; el.textContent = '▼ Ruwe brondata verbergen'; }
  else { pre.style.display = 'none'; el.textContent = '▶ Ruwe brondata tonen'; }
}

async function quickStatus(statusValue) {
  if (!selectedRecord) return;
  document.getElementById('d-status').value = statusValue;
  await saveRecord();
}

async function saveRecord() {
  if (!selectedRecord) return;
  try {
    const token = await getToken();
    const body = { cre1c_aanbiedingnaam: document.getElementById('d-naam').value, cre1c_toegewezenaan: document.getElementById('d-toegewezen').value, cre1c_aisamenvatting: document.getElementById('d-ai').value };
    const s = document.getElementById('d-status').value; if (s) body.cre1c_status = parseInt(s);
    const b = document.getElementById('d-bron').value; if (b) body.cre1c_bron = parseInt(b);
    const t = document.getElementById('d-type').value; if (t) body.cre1c_typeaanbieder = parseInt(t);
    const d = document.getElementById('d-datum').value; if (d) body.cre1c_datumbinnenkomst = d;
    const res = await fetch(`${API}/cre1c_aanbiedings(${selectedRecord.cre1c_aanbiedingid})`, {
      method: 'PATCH',
      headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json', 'OData-MaxVersion': '4.0', 'OData-Version': '4.0', 'If-Match': '*' },
      body: JSON.stringify(body)
    });
    if (res.ok || res.status === 204) {
      Object.assign(selectedRecord, body);
      filterCards();
      showToast('Opgeslagen ✓');
    } else throw new Error(`HTTP ${res.status}`);
  } catch(e) { showToast('Fout: ' + e.message, true); }
}

function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = isError ? '#A32D2D' : '#185FA5';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escAttr(s) { return String(s).replace(/"/g,'&quot;'); }

init();
</script>
</body>
</html>
