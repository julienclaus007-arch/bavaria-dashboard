<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bavaria Motors</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;color:#1a1a1a}
#status{padding:20px;font-size:14px;color:#888}
.login-card{background:white;padding:40px;border-radius:12px;text-align:center;box-shadow:0 2px 20px rgba(0,0,0,.1);max-width:380px;width:90%;margin:20vh auto}
.login-card h2{font-size:22px;color:#185FA5;margin-bottom:8px}
.login-card p{font-size:13px;color:#888;margin-bottom:24px}
.btn{padding:10px 24px;background:#185FA5;color:white;border:none;border-radius:8px;font-size:14px;cursor:pointer;width:100%}
header{background:#185FA5;color:white;padding:12px 20px;display:flex;align-items:center;justify-content:space-between}
header h1{font-size:16px;font-weight:500}
#ulabel{font-size:12px;background:rgba(255,255,255,.2);padding:4px 12px;border-radius:20px}
.dash{display:grid;grid-template-columns:350px 1fr;height:calc(100vh - 46px);overflow:hidden}
.left{background:white;border-right:1px solid #e5e5e5;display:flex;flex-direction:column;overflow:hidden}
.lh{padding:12px 14px;border-bottom:1px solid #e5e5e5;display:flex;justify-content:space-between;align-items:center;font-size:14px;font-weight:600}
.rb{font-size:11px;color:#185FA5;cursor:pointer;background:none;border:none}
.sw{padding:8px 12px;border-bottom:1px solid #e5e5e5}
.sw input{width:100%;padding:6px 10px;border:1px solid #ddd;border-radius:6px;font-size:13px;outline:none}
.fw{display:flex;gap:6px;padding:7px 12px;border-bottom:1px solid #e5e5e5}
.fw select{flex:1;padding:4px;border:1px solid #ddd;border-radius:5px;font-size:11px;outline:none}
.cnt{padding:5px 12px;font-size:11px;color:#888;border-bottom:1px solid #e5e5e5}
.gal{flex:1;overflow-y:auto}
.card{padding:11px 13px;border-bottom:1px solid #f0f0f0;cursor:pointer}
.card:hover{background:#f8f9ff}
.card.sel{background:#E6F1FB;border-left:3px solid #185FA5}
.cn{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cs{font-size:11px;color:#888;margin-top:2px}
.bdg{display:inline-block;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:600;margin-top:4px}
.bn{background:#E6F1FB;color:#185FA5}
.bg{background:#EAF3DE;color:#3B6D11}
.br{background:#FCEBEB;color:#A32D2D}
.bo{background:#F1EFE8;color:#5F5E5A}
.right{background:white;display:flex;flex-direction:column;overflow:hidden}
.rh{padding:12px 16px;border-bottom:1px solid #e5e5e5;display:flex;align-items:center;justify-content:space-between}
.rh h2{font-size:14px;font-weight:600}
.abs{display:flex;gap:6px}
.bok{padding:5px 12px;background:#3B6D11;color:white;border:none;border-radius:5px;font-size:11px;cursor:pointer}
.bnk{padding:5px 12px;background:#A32D2D;color:white;border:none;border-radius:5px;font-size:11px;cursor:pointer}
.bsv{padding:5px 12px;background:#185FA5;color:white;border:none;border-radius:5px;font-size:11px;cursor:pointer}
.det{flex:1;overflow-y:auto;padding:14px}
.sec{font-size:10px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.5px;margin:12px 0 8px}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.f{display:flex;flex-direction:column;gap:3px}
.f.full{grid-column:1/-1}
.f label{font-size:10px;color:#888}
.f input,.f select,.f textarea{padding:6px 8px;border:1px solid #ddd;border-radius:5px;font-size:12px;outline:none;font-family:inherit}
.f textarea{min-height:70px;resize:vertical}
.ph{display:flex;align-items:center;justify-content:center;height:100%;color:#bbb;font-size:13px}
.ld{display:flex;align-items:center;justify-content:center;height:100%;color:#888;font-size:13px}
.er{padding:10px;background:#FCEBEB;border-radius:6px;color:#A32D2D;font-size:12px;margin:8px}
.rt{font-size:11px;color:#888;cursor:pointer;padding:6px 0}
.rp{font-size:11px;background:#f8f8f8;padding:8px;border-radius:5px;white-space:pre-wrap;word-break:break-word;color:#555;max-height:160px;overflow-y:auto;margin-top:4px}
.toast{position:fixed;bottom:16px;right:16px;background:#185FA5;color:white;padding:9px 18px;border-radius:7px;font-size:13px;z-index:999;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}
</style>
</head>
<body>

<div id="root"><div id="status">Initialiseren...</div></div>

<script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@2.38.3/lib/msal-browser.min.js"></script>
<script>
var T='ca546dbe-173e-4472-a229-a1693f306e1c';
var C='20ea0053-8bb6-49b9-90a6-9198a80e746a';
var DV='https://org2dfe0154.crm4.dynamics.com';
var API=DV+'/api/data/v9.2';
var SM={102820000:'Nieuw',102820001:'Goedgekeurd',102820002:'Manueel goedgekeurd',102820003:'Afgewezen'};
var BM={102820000:'WhatsApp',102820001:'Website',102820002:'Email'};
var SB={102820000:'bn',102820001:'bg',102820002:'bg',102820003:'br'};
var mi,all=[],sel=null;

mi=new msal.PublicClientApplication({
  auth:{clientId:C,authority:'https://login.microsoftonline.com/'+T,redirectUri:'https://julienclaus007-arch.github.io/bavaria-dashboard/'},
  cache:{cacheLocation:'localStorage',storeAuthStateInCookie:true}
});

mi.handleRedirectPromise().then(function(r){
  var acc=r?r.account:null;
  if(!acc){var accs=mi.getAllAccounts();if(accs.length)acc=accs[0];}
  if(acc){renderApp(acc);}
  else{renderLogin();}
}).catch(function(e){
  document.getElementById('root').innerHTML='<div class="er" style="margin:20px">Auth fout: '+esc(e.message)+'</div>';
});

function renderLogin(){
  document.getElementById('root').innerHTML=
    '<div class="login-card"><h2>Bavaria Motors</h2><p>Log in met julien@bavariamotors.be</p><button class="btn" onclick="doLogin()">Inloggen met Microsoft</button></div>';
}

function renderApp(acc){
  document.getElementById('root').innerHTML=
    '<header><h1>Bavaria Motors — Aankoopdashboard</h1><span id="ulabel">'+esc(acc.username)+'</span></header>'+
    '<div class="dash">'+
      '<div class="left">'+
        '<div class="lh">Aanbiedingen <button class="rb" onclick="load()">&#8635; Vernieuwen</button></div>'+
        '<div class="sw"><input id="srch" placeholder="Zoeken..." oninput="filt()"/></div>'+
        '<div class="fw">'+
          '<select id="fs" onchange="filt()"><option value="">Alle statussen</option><option value="102820000">Nieuw</option><option value="102820001">Goedgekeurd</option><option value="102820002">Manueel goedgekeurd</option><option value="102820003">Afgewezen</option></select>'+
          '<select id="fb" onchange="filt()"><option value="">Alle bronnen</option><option value="102820000">WhatsApp</option><option value="102820001">Website</option><option value="102820002">Email</option></select>'+
        '</div>'+
        '<div class="cnt" id="cnt"></div>'+
        '<div class="gal" id="gal"><div class="ld">Data ophalen...</div></div>'+
      '</div>'+
      '<div class="right">'+
        '<div class="rh"><h2 id="dtit">Detail</h2><div class="abs" id="abs" style="display:none"><button class="bok" onclick="qs(102820001)">Goedkeuren</button><button class="bnk" onclick="qs(102820003)">Afwijzen</button><button class="bsv" onclick="save()">Opslaan</button></div></div>'+
        '<div class="det" id="det"><div class="ph">Selecteer een aanbieding</div></div>'+
      '</div>'+
    '</div>'+
    '<div class="toast" id="tst"></div>';
  load();
}

function doLogin(){mi.loginRedirect({scopes:[DV+'/user_impersonation']});}

function getTok(){
  var acc=mi.getAllAccounts();
  var req={scopes:[DV+'/user_impersonation'],account:acc[0]};
  return mi.acquireTokenSilent(req).catch(function(){return mi.acquireTokenPopup(req);}).then(function(r){return r.accessToken;});
}

function load(){
  document.getElementById('gal').innerHTML='<div class="ld">Laden...</div>';
  getTok().then(function(tok){
    return fetch(API+'/cre1c_aanbiedings?$orderby=createdon desc&$top=200',{
      headers:{Authorization:'Bearer '+tok,Accept:'application/json','OData-MaxVersion':'4.0','OData-Version':'4.0'}
    });
  }).then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
  .then(function(d){all=d.value||[];filt();tst(all.length+' records geladen');})
  .catch(function(e){document.getElementById('gal').innerHTML='<div class="er">'+esc(e.message)+'</div>';});
}

function filt(){
  var s=(document.getElementById('srch').value||'').toLowerCase();
  var fs=document.getElementById('fs').value;
  var fb=document.getElementById('fb').value;
  var f=all.filter(function(r){
    return((!s)||(r.cre1c_aanbiedingnaam||'').toLowerCase().includes(s)||(r.cre1c_aisamenvatting||'').toLowerCase().includes(s))
      &&(!fs||String(r.cre1c_status)===fs)&&(!fb||String(r.cre1c_bron)===fb);
  });
  document.getElementById('cnt').textContent=f.length+' van '+all.length;
  if(!f.length){document.getElementById('gal').innerHTML='<div class="ld">Geen resultaten</div>';return;}
  document.getElementById('gal').innerHTML=f.map(function(r){
    var sl=SM[r.cre1c_status]||'Onbekend';
    var bc=SB[r.cre1c_status]||'bo';
    var bl=BM[r.cre1c_bron]||'';
    var dt=r.cre1c_datumbinnenkomst?new Date(r.cre1c_datumbinnenkomst).toLocaleDateString('nl-BE'):'';
    var isSel=sel&&sel.cre1c_aanbiedingid===r.cre1c_aanbiedingid;
    return '<div class="card'+(isSel?' sel':'')+'" onclick="doSel(\''+r.cre1c_aanbiedingid+'\')">'+
      '<div class="cn">'+esc(r.cre1c_aanbiedingnaam||'(geen naam)')+'</div>'+
      '<div class="cs">'+bl+(r.cre1c_toegewezenaan?' · '+r.cre1c_toegewezenaan:'')+(dt?' · '+dt:'')+'</div>'+
      '<span class="bdg '+bc+'">'+sl+'</span></div>';
  }).join('');
}

function doSel(id){
  sel=all.find(function(r){return r.cre1c_aanbiedingid===id;});
  filt();renderDet();
}

function op(v,l,cur){return'<option value="'+v+'"'+(cur==v?' selected':'')+'>'+l+'</option>';}

function renderDet(){
  var r=sel;
  document.getElementById('abs').style.display='flex';
  document.getElementById('dtit').textContent=r.cre1c_aanbiedingnaam||'Detail';
  var raw=(r.cre1c_ruwebrondata||'').replace(/<[^>]*>/g,'').trim().substring(0,1000);
  document.getElementById('det').innerHTML=
    '<div class="sec">Basisinfo</div><div class="fg">'+
    '<div class="f full"><label>Naam</label><input id="dn" value="'+ea(r.cre1c_aanbiedingnaam||'')+'"/></div>'+
    '<div class="f"><label>Status</label><select id="ds"><option value="">Kies...</option>'+op(102820000,'Nieuw',r.cre1c_status)+op(102820001,'Goedgekeurd',r.cre1c_status)+op(102820002,'Manueel goedgekeurd',r.cre1c_status)+op(102820003,'Afgewezen',r.cre1c_status)+'</select></div>'+
    '<div class="f"><label>Bron</label><select id="db"><option value="">Kies...</option>'+op(102820000,'WhatsApp',r.cre1c_bron)+op(102820001,'Website',r.cre1c_bron)+op(102820002,'Email',r.cre1c_bron)+'</select></div>'+
    '<div class="f"><label>Toegewezen aan</label><input id="dt" value="'+ea(r.cre1c_toegewezenaan||'')+'"/></div>'+
    '<div class="f"><label>Datum</label><input type="date" id="dd" value="'+(r.cre1c_datumbinnenkomst?r.cre1c_datumbinnenkomst.substring(0,10):'')+'"/></div>'+
    '</div>'+
    '<div class="f" style="margin-bottom:10px"><label>AI samenvatting</label><textarea id="dai">'+esc(r.cre1c_aisamenvatting||'')+'</textarea></div>'+
    (raw?'<div class="rt" onclick="togR(this)">&#9658; Ruwe brondata</div><div class="rp" style="display:none">'+esc(raw)+'</div>':'');
}

function togR(el){var p=el.nextElementSibling;p.style.display=p.style.display==='none'?'block':'none';}
function qs(v){document.getElementById('ds').value=v;save();}

function save(){
  var body={cre1c_aanbiedingnaam:document.getElementById('dn').value,cre1c_toegewezenaan:document.getElementById('dt').value,cre1c_aisamenvatting:document.getElementById('dai').value};
  var sv=document.getElementById('ds').value;if(sv)body.cre1c_status=parseInt(sv);
  var bv=document.getElementById('db').value;if(bv)body.cre1c_bron=parseInt(bv);
  var dv=document.getElementById('dd').value;if(dv)body.cre1c_datumbinnenkomst=dv;
  getTok().then(function(tok){
    return fetch(API+'/cre1c_aanbiedings('+sel.cre1c_aanbiedingid+')',{method:'PATCH',headers:{Authorization:'Bearer '+tok,'Content-Type':'application/json','OData-MaxVersion':'4.0','OData-Version':'4.0','If-Match':'*'},body:JSON.stringify(body)});
  }).then(function(r){
    if(r.ok||r.status===204){Object.assign(sel,body);filt();tst('Opgeslagen ✓');}
    else throw new Error('HTTP '+r.status);
  }).catch(function(e){tst('Fout: '+e.message,1);});
}

function tst(msg,err){
  var t=document.getElementById('tst');
  if(!t)return;
  t.textContent=msg;t.style.background=err?'#A32D2D':'#185FA5';
  t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2500);
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ea(s){return String(s).replace(/"/g,'&quot;');}
</script>
</body>
</html>
